# 本地开发依赖：PostgreSQL + Redis
# 用法：docker compose -f docker-compose.dev.yml up -d
#       然后 npx prisma migrate dev 初始化表
services:
  postgres:
    image: postgres:16-alpine
    container_name: weijin100-pg
    environment:
      POSTGRES_USER: weijin
      POSTGRES_PASSWORD: weijin_dev
      POSTGRES_DB: weijin100
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weijin -d weijin100"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: weijin100-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
