<!doctype html>
<html lang="zh-CN">
<head>

<style>
:root{
  --gold-1:#E3C588; --gold-2:#CDA85F; --gold-3:#B8913F; --btn-1:#D8B873; --btn-2:#C09A4C;
  --paper:#F2EFEA; --card:#FFFFFF; --cream:#FBF1DE; --ink:#2C241A; --ink-2:#6E6353; --muted:#A89C8A; --faint:#C9BEAD;
  --line:#EFEAE0; --line-2:#F4F0E8; --up:#E0492F; --down:#1FA766; --blue:#3E63C7;
  --tag-orange:#E07A2E; --tag-orange-bg:#FCEBDC; --tag-blue:#3E8FD8; --tag-blue-bg:#E6F0FB;
  --grad-cream:linear-gradient(120deg,#FCEAD2 0%,#FDF3E6 55%,#FFFDFA 100%);
  --shadow:0 1px 2px rgba(70,52,20,.04),0 8px 22px rgba(120,90,30,.07);
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif;
  color:var(--ink);background:linear-gradient(160deg,#2a2118,#191410);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.tnum{font-variant-numeric:tabular-nums}

/* ===== 手机壳 ===== */
.phone{width:380px;max-width:96vw;position:relative;background:linear-gradient(160deg,#26201a,#100d0a);
  border-radius:50px;padding:11px;box-shadow:0 40px 90px -20px rgba(0,0,0,.6),inset 0 0 0 2px #362d22}
.device{position:relative;width:100%;height:760px;max-height:88vh;border-radius:40px;overflow:hidden;background:linear-gradient(180deg,#ece4d6,#e7ddcc);display:flex;flex-direction:column}
.island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:96px;height:25px;background:#000;border-radius:14px;z-index:60}
.sb{height:46px;flex:0 0 46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;font-size:14px;font-weight:600;z-index:40}
.sb .ic{display:flex;gap:5px;align-items:center}
.nav{height:46px;flex:0 0 46px;display:flex;align-items:center;padding:0 14px;gap:8px;position:relative}
.nav .back{width:34px;height:34px;border-radius:50%;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--ink)}
.nav .title{font-size:17px;font-weight:700;position:absolute;left:50%;transform:translateX(-50%)}
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.body::-webkit-scrollbar{width:0}
.pad{padding:0 14px 24px}

/* tabbar */
.tabbar{height:64px;flex:0 0 64px;display:flex;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding-top:7px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer}
.tab.on{color:var(--gold-3)}
.tab svg{width:23px;height:23px}

/* ===== 通用 ===== */
.card{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:14px;margin-top:12px}
.btn{height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;
  background:linear-gradient(180deg,var(--btn-1),var(--btn-2));color:#fff;box-shadow:0 6px 16px rgba(184,145,63,.3)}
.btn.ghost{background:#fff;color:var(--ink-2);border:1px solid var(--line);box-shadow:none}
.btn.dis{opacity:.5;pointer-events:none}
.row{display:flex;align-items:center}
.lvb{display:inline-flex;align-items:center;font-size:10px;font-weight:800;color:#fff;padding:1px 6px;border-radius:5px}
.lvb.hi{background:linear-gradient(135deg,#EBCB7C,#B8913F)} .lvb.mid{background:linear-gradient(135deg,#5BB3CC,#2E8CA8)} .lvb.lo{background:linear-gradient(135deg,#AAB2BF,#727B8A)}
.tg{display:inline-flex;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;color:var(--ink-2);background:#F4EFE5}
.tg.cat{color:var(--gold-3);background:var(--cream)} .tg.zheng{color:var(--tag-orange);background:var(--tag-orange-bg)} .tg.san{color:#C2693B;background:#FBEAD9} .tg.spot{color:var(--tag-blue);background:var(--tag-blue-bg)}
.tg.st-selling{color:var(--gold-3);background:var(--cream)} .tg.st-locked{color:var(--tag-orange);background:var(--tag-orange-bg)} .tg.st-done{color:var(--down);background:#E6F4ED} .tg.st-arb{color:var(--up);background:#FFEBE7}
.c-up{color:var(--up)} .c-down{color:var(--down)} .c-blue{color:var(--blue)}
.muted{color:var(--muted)} .sec{font-size:11px;font-weight:700;color:var(--muted);margin:16px 2px 4px;letter-spacing:.5px}

/* 首页头 */
.hh{display:flex;align-items:center;gap:9px;padding:6px 2px 10px}
.hh .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(150deg,#F6E6BD,#B8913F);color:#fff;font-weight:800;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(184,145,63,.32)}
.hh .b1{font-size:16px;font-weight:800} .hh .b2{font-size:11px;color:var(--muted)}
.hh .sub{margin-left:auto;padding:7px 13px;border-radius:99px;border:1px solid #E4D8C2;background:#fff;font-size:13px;font-weight:700;color:var(--ink-2);cursor:pointer}
/* 金价卡 */
.pc{border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-top:4px}
.pc-h{padding:14px 16px 10px;background:var(--grad-cream)}
.pc-top{display:flex;justify-content:space-between;align-items:baseline}
.pc-lab{font-size:12px;color:#9c8458;font-weight:700} .pc-prem{font-size:11px;color:var(--up);font-weight:700}
.pc-big{font-size:33px;font-weight:800;color:#2B2118;letter-spacing:-.5px;line-height:1;margin-top:5px}
.pc-chg{font-size:13px;font-weight:700;margin-top:7px;display:flex;align-items:center;gap:5px}
.dia{width:9px;height:9px;border-radius:2px;transform:rotate(45deg);background:currentColor}
.pc-time{font-size:10px;color:var(--muted);margin-top:7px}
.pc-st{display:flex;background:#fff;padding:11px 4px 13px;border-top:1px dashed var(--line-2)}
.pc-st .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.pc-st .k{font-size:10px;color:var(--muted)} .pc-st .v{font-size:14px;font-weight:800}
/* 折页tab */
.mkt{display:flex;align-items:flex-end;gap:3px;margin-top:16px;border-bottom:2px solid #E4D8BE}
.mkt .t{font-size:13px;font-weight:700;color:var(--muted);padding:8px 15px 9px;cursor:pointer}
.mkt .t.on{color:#6B4F1A;font-weight:800;background:linear-gradient(180deg,#F4E1AE,#E7C778);border-radius:11px 11px 0 0;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 100%,0 100%)}
/* chips */
.chips{display:flex;gap:7px;margin-top:11px;overflow-x:auto;padding-bottom:3px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 13px;border-radius:99px;font-size:12px;font-weight:600;color:var(--ink-2);background:#fff;border:1px solid #ECE3D3;cursor:pointer;white-space:nowrap}
.chip.on{color:#fff;background:linear-gradient(180deg,#3C3326,#2A2218);border-color:transparent;font-weight:700}
/* 挂单行 */
.lh{display:flex;font-size:10px;color:var(--muted);padding:11px 4px 6px}
.gr{display:flex;align-items:center;gap:7px;background:#fff;border-radius:13px;padding:10px 9px;margin-bottom:8px;box-shadow:0 1px 2px rgba(70,52,20,.04)}
.gr .av{flex:0 0 28px;width:28px;height:28px;border-radius:50%;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;align-self:flex-start}
.gr .nm{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.gr .l1{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700}
.gr .l2{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.gr .pn{font-size:10px;font-weight:800;color:var(--gold-3)}
.gr .stk{flex:0 0 48px;text-align:center}
.gr .stk .n{font-size:12px;font-weight:800} .gr .stk .u{font-size:9px;color:var(--muted)}
.gr .stk .mq{font-size:9px;font-weight:800;color:var(--gold-3)} .gr .stk .mq.w{color:var(--tag-orange)}
.gr .pr{flex:0 0 90px;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.pp{display:flex;align-items:center;gap:3px;font-size:11px;white-space:nowrap}
.pchip{width:13px;height:13px;border-radius:4px;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}
.pchip.cash{background:linear-gradient(135deg,#F08A6F,#E0492F)} .pchip.trans{background:linear-gradient(135deg,#5A87E0,#3E63C7)}
.gr .lk{flex:0 0 42px;padding:8px 0;border-radius:9px;background:linear-gradient(180deg,var(--btn-1),var(--btn-2));color:#fff;font-size:12px;font-weight:800;text-align:center;cursor:pointer}
/* 列表项/菜单 */
.li{display:flex;align-items:center;gap:10px;padding:14px 2px;border-top:1px solid var(--line-2);cursor:pointer}
.li:first-child{border-top:none} .li .k{font-size:14px} .li .v{margin-left:auto;color:var(--muted);font-size:13px}
.li .arr{color:var(--faint);margin-left:6px}
/* 我的头卡 */
.us{display:flex;align-items:center;gap:12px;background:var(--grad-cream);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-top:4px}
.us .av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#E3C588,#B8913F);color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center}
.us .nm{font-size:17px;font-weight:800;display:flex;align-items:center;gap:6px}
.us .no{font-size:11px;color:var(--ink-2);margin-top:3px}
/* 余额/保证金卡 */
.bal{background:var(--grad-cream);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-top:12px}
.bal .lab{font-size:11px;color:#9c8458;font-weight:700} .bal .big{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-top:3px}
.bal .q{display:flex;margin-top:14px;border-top:1px solid rgba(184,145,63,.2);padding-top:12px}
.bal .q .c{flex:1;text-align:center} .bal .q .c .qv{font-size:18px;font-weight:800;color:var(--gold-3)} .bal .q .c .qk{font-size:11px;color:var(--ink-2)}
/* 表单 */
.field{display:flex;align-items:center;min-height:50px;border-top:1px solid var(--line-2);gap:10px}
.field:first-child{border-top:none} .field .fl{font-size:14px;font-weight:600;white-space:nowrap}
.field input,.field .fi{flex:1;text-align:right;border:none;outline:none;background:transparent;font-size:14px;color:var(--ink);font-family:inherit;font-weight:600;min-width:0}
.seg{display:flex;background:#F4EFE5;border-radius:11px;padding:3px;gap:3px;margin:6px 0}
.seg .s{flex:1;text-align:center;padding:8px 0;border-radius:9px;font-size:13px;font-weight:700;color:var(--ink-2);cursor:pointer}
.seg .s.on{background:#fff;color:var(--gold-3);font-weight:800;box-shadow:0 2px 6px rgba(120,90,30,.1)}
.cta{padding:12px 14px calc(14px + env(safe-area-inset-bottom));position:sticky;bottom:0;background:linear-gradient(180deg,rgba(242,239,234,0),var(--paper) 40%)}
/* 弹窗 */
.mask{position:absolute;inset:0;background:rgba(30,22,10,.45);display:flex;align-items:flex-end;z-index:80;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;background:#fff;border-radius:20px 20px 0 0;padding:16px 16px 24px;max-height:80%;overflow-y:auto;animation:up .25s}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .sh{display:flex;align-items:center;margin-bottom:14px}
.sheet .sh .t{font-size:17px;font-weight:800} .sheet .sh .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:20px}
/* 结果 */
.result{display:flex;flex-direction:column;align-items:center;padding:50px 30px;text-align:center}
.result .bd{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:42px;font-weight:800;margin-bottom:18px}
.result .bd.ok{background:linear-gradient(180deg,#46c47e,#2B8A5B)} .result .bd.err{background:linear-gradient(180deg,#f08a6f,#E0492F)}
.result h2{margin:0 0 8px;font-size:22px} .result p{margin:0;color:var(--ink-2);font-size:14px;line-height:1.6}
.spin{width:60px;height:60px;border-radius:50%;border:5px solid #F0E2C5;border-top-color:var(--gold-2);animation:rot 1s linear infinite;margin:60px auto 24px}
@keyframes rot{to{transform:rotate(360deg)}}
/* toast */
#toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;opacity:0;transition:.25s;z-index:200;pointer-events:none;max-width:80%;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.contact{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;background:linear-gradient(180deg,#FDF7E9,#FBF1DE);border:1px solid #F0E2C5;margin-top:8px}
.contact .ci{width:38px;height:38px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px}
.contact .ci.ph{background:linear-gradient(135deg,#46c47e,#2B8A5B)} .contact .ci.wx{background:linear-gradient(135deg,#3CB957,#249746)}
.contact .ct{flex:1} .contact .ct .a{font-size:11px;color:var(--muted)} .contact .ct .b{font-size:15px;font-weight:800;letter-spacing:.5px}
.contact .cb{padding:6px 12px;border-radius:8px;background:#fff;color:var(--gold-3);font-size:12px;font-weight:700;border:1px solid #F0E2C5;cursor:pointer}
.banner{display:flex;gap:8px;padding:9px 11px;background:#FFF6E5;border:1px solid #F3DBA5;border-radius:10px;font-size:12px;color:#9b6e1f;line-height:1.5;margin:10px 0}
.steps .st{display:flex;gap:10px;padding:10px 0}
.steps .st .i{flex:0 0 26px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.steps .st.done .i{background:linear-gradient(135deg,#46c47e,#2B8A5B);color:#fff} .steps .st.cur .i{background:linear-gradient(135deg,#EBCB7C,#B8913F);color:#fff} .steps .st.todo .i{background:var(--cream);color:var(--muted)}
.steps .st .tt{font-size:14px;font-weight:700} .steps .st .td{font-size:11px;color:var(--muted);margin-top:2px}
.demo-note{position:fixed;top:14px;left:14px;color:#cbb88f;font-size:12px;font-weight:600;opacity:.8}
</style>
</head>

const TABS=['home','market','publish','order','mine'];
const TAB_TITLE={home:'微金100',market:'行情',publish:'发布现货',order:'订单',mine:'我的'};
let stack=[{n:'home'}], modal=null, lockDone=false;
function cur(){return stack[stack.length-1]}
function go(n,p){stack.push({n,p:p||{}});modal=null;render();scrollTop()}
function back(){if(stack.length>1){stack.pop();modal=null;render()}}
function tab(n){stack=[{n}];modal=null;render();scrollTop()}
function scrollTop(){document.getElementById('body').scrollTop=0}
function openM(t,p){modal={t,p:p||{}};render()}
function closeM(){modal=null;render()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200)}

/* ================= 通用片段 ================= */
function quoteCard(q){return `<div class="pc"><div class="pc-h">
  <div class="pc-top"><span class="pc-lab">${q.label} · ${q.unit}</span><span class="pc-prem">溢价 ${q.prem} ⓘ</span></div>
  <div class="pc-big tnum">${q.price}</div>
  <div class="pc-chg c-${q.trend}"><span class="dia"></span><span class="tnum">${q.chg}　${q.pct}</span></div>
  <div class="pc-time">● 报价时间 2026-04-28 12:57:40</div></div>
  <div class="pc-st">
    <div class="col"><span class="k">当日最高价</span><span class="v c-up tnum">${q.high}</span></div>
    <div class="col"><span class="k">当日最低价</span><span class="v c-down tnum">${q.low}</span></div>
    <div class="col"><span class="k">销售价</span><span class="v c-up tnum">${q.sale}</span></div>
    <div class="col"><span class="k">回购价</span><span class="v c-down tnum">${q.buy}</span></div>
  </div></div>`}
function listRow(it){const tags=it.tags.map(t=>`<span class="tg ${t[1]}">${t[0]}</span>`).join('');
  const pr=it.st?`<div class="pp"><span class="pchip cash">现</span><span class="tnum" style="font-weight:800">${it.cash}</span></div><div class="pp"><span class="pchip trans">转</span><span class="tnum" style="font-weight:800">${it.trans}</span></div>`
    :`<div class="pp"><span class="pchip cash">现</span><span class="tnum" style="font-weight:800">${it.cash}</span></div><div class="pp muted" style="font-size:10px">转 不支持</div>`;
  return `<div class="gr"><div class="av" style="background:linear-gradient(135deg,${it.avc})">${it.av}</div>
    <div class="nm"><div class="l1"><span class="tnum">${it.uid}</span><span class="lvb ${it.lc}">${it.lv}</span></div>
      <div class="l2"><span class="pn">融通足金价</span><span class="tg cat">${it.cat}</span>${tags}</div></div>
    <div class="stk"><div><span class="n tnum">${it.stock}</span><span class="u">g</span></div><div class="mq ${it.mqw?'w':''}">${it.moq}</div></div>
    <div class="pr">${pr}</div>
    <div class="lk" onclick="go('lock',{id:'${it.id}'})">锁价</div></div>`}

  ${DEFAULTS.map(d=>`<div class="card"><div class="row" style="gap:8px"><span style="font-size:15px;font-weight:700">${d.type}</span><span class="tg san">${d.role}</span></div>
  <div class="muted tnum" style="font-size:11px;margin-top:6px">关联订单 ${d.order}</div>
  <div style="margin-top:8px;font-size:13px">${d.weight}g · 扣款 <span class="c-up tnum" style="font-weight:800">¥${d.deduct}</span></div>
  <div style="margin-top:6px;font-size:13px"><span class="muted">处罚</span> ${d.penalty}</div>
  <div class="row" style="margin-top:10px"><span style="font-size:12px;color:var(--up);font-weight:700">${d.status}</span><span class="muted tnum" style="margin-left:auto;font-size:11px">${d.time}</span></div>
  <div style="margin-top:12px;text-align:center;padding:12px;border-radius:12px;background:#FFF1E5;color:var(--tag-orange);font-weight:700;font-size:13px" onclick="go('appeal',{id:'${d.id}'})">去申诉（24h 内）</div></div>`).join('')}`},

appeal(){return `<div class="card"><div class="muted" style="font-size:12px">关联违约记录</div><div style="font-weight:700;margin-top:4px tnum">${cur().p.id||'D1'} · 超时未交割</div></div>
  <div class="banner">违约判定后 24 小时内可提交申诉；申诉成立将退回扣款并恢复级别。</div>
  <div class="sec">上传证据（最多 5 张）</div><div class="card"><div style="display:flex;gap:10px"><div style="width:72px;height:72px;border-radius:12px;border:2px dashed var(--faint);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:28px">+</div></div></div>
  <div class="sec">申诉理由</div><div class="card"><textarea style="width:100%;border:none;outline:none;min-height:90px;font-family:inherit;font-size:14px;resize:none" placeholder="请说明申诉理由与事实经过…"></textarea></div>
  <div class="cta"><div class="btn" onclick="toast('申诉已提交，平台将尽快处理');setTimeout(back,800)">提交申诉</div></div>`},

address(){return `<div class="banner">收 / 取货地址，仅在对手方锁价成交后对其可见。</div>
  ${ADDRS.map(a=>`<div class="card"><div class="row" style="gap:8px"><span class="tg ${a.type==='收货'?'spot':'cat'}">${a.type}</span>${a.def?'<span class="tg cat">默认</span>':''}<span style="margin-left:auto;font-size:12px;color:var(--up)" onclick="toast('已删除（演示）')">删除</span></div>
  <div style="margin-top:8px;font-size:14px;font-weight:700">${a.contact} <span class="tnum muted" style="font-weight:400">${a.phone}</span></div>
  <div class="muted" style="font-size:13px;margin-top:4px;line-height:1.5">${a.addr}</div></div>`).join('')}
  <div class="btn ghost" style="margin-top:14px" onclick="toast('新增地址表单（演示）')">+ 新增地址</div>`},

priceAlert(){return `<div class="banner">金价到达目标价时提醒你，每个品类最多 6–8 条。</div>
  ${ALERTS.map(a=>`<div class="card"><div class="row" style="gap:8px"><span style="font-size:14px;font-weight:700">${a.mn}</span><span class="c-${a.cc}" style="font-size:13px;font-weight:700">${a.cond}</span><span class="tnum" style="font-weight:800">¥${a.price}</span><span style="margin-left:auto;font-size:12px;color:var(--up)" onclick="toast('已删除（演示）')">删除</span></div>
  <div style="margin-top:8px;display:flex;gap:6px">${a.ch.map(c=>`<span class="tg ${c==='推送'?'spot':'cat'}">${c}</span>`).join('')}</div></div>`).join('')}
  <div class="btn ghost" style="margin-top:14px" onclick="openM('alert')">+ 新增提醒</div>`},

lock(){const it=LISTINGS.find(x=>x.id===cur().p.id)||LISTINGS[0];
  const modeT=it.mode==='whole'?'整出全量':it.mode==='fixed'?'整出固量':'散出';
  const modeTg=it.mode==='bulk'?'san':'zheng';
  const cashTotal=(parseFloat(it.cash.replace(/,/g,''))*it.stock).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
  const transTotal=it.st?(parseFloat(it.trans.replace(/,/g,''))*it.stock).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}):null;
  return `<div class="card"><div class="row" style="gap:10px"><div class="av" style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,${it.avc});color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center">${it.av}</div>
  <div><div class="row" style="gap:6px"><span style="font-weight:700">${it.uid}</span><span class="lvb ${it.lc}">${it.lv}</span></div><div class="muted" style="font-size:12px;margin-top:3px">黄金 · ${it.cat} · 融通足金价</div></div></div></div>
  <div class="card"><div class="row" style="gap:12px;align-items:baseline"><span style="font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,#F08A6F,#E0492F);padding:3px 10px;border-radius:6px">现金价</span><span style="font-size:26px;font-weight:800" class="tnum">${it.cash}</span><span class="muted" style="font-size:12px">元/克</span></div>
  ${it.st?`<div class="row" style="gap:12px;align-items:baseline;margin-top:10px"><span style="font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5A87E0,#3E63C7);padding:3px 10px;border-radius:6px">转账价</span><span style="font-size:26px;font-weight:800" class="tnum">${it.trans}</span><span class="muted" style="font-size:12px">元/克</span></div>`:''}</div>
  <div class="card"><div class="row" style="gap:10px"><span style="font-weight:700">购买数量</span><span class="tg ${modeTg}">${modeT}</span></div>
  <div style="margin-top:14px;font-size:32px;font-weight:800" class="tnum">${it.stock} <span style="font-size:14px;color:var(--muted)">g</span></div>
  <div class="muted" style="font-size:12px;margin-top:6px">${it.mode==='whole'?'整出全量，须全量锁定':it.mode==='fixed'?'整出固量，按 '+it.lot+'g 整数倍':'散出，'+it.moq}</div></div>
  <div class="card"><div class="row"><span class="muted">现金支付</span><span class="c-up tnum" style="margin-left:auto;font-weight:800;font-size:18px">¥ ${cashTotal}</span></div>
  ${transTotal?`<div class="row" style="margin-top:8px"><span class="muted">转账支付</span><span class="c-blue tnum" style="margin-left:auto;font-weight:800">¥ ${transTotal}</span></div>`:'<div class="row" style="margin-top:8px"><span class="muted">转账支付</span><span class="c-up" style="margin-left:auto;font-size:13px;font-weight:700">商家不支持转账</span></div>'}</div>
  <div class="muted" style="font-size:11px;text-align:center;padding:14px 10px">锁价后卖家须 4 小时内线下实名交割</div>
  <div class="cta"><div class="btn" onclick="openM('lockConfirm',{id:'${it.id}',cash:'${cashTotal}'})">确认锁价</div></div>`},

lockResult(){if(!lockDone)return `<div class="result"><div class="spin"></div><h2 style="font-size:18px">锁价处理中…</h2><p>正在为你锁定价格，请稍候</p></div>`;
  return `<div class="result"><div class="bd ok">✓</div><h2>锁价成功</h2><p>请在 4 小时内与卖家完成线下交割</p></div>
  <div class="card" style="margin:0 0 0"><div class="muted" style="font-size:12px">订单号</div><div class="tnum" style="font-weight:700;margin-top:4px">250603 9999 123456 02</div></div>
  <div class="sec">联系卖家</div>
  <div class="contact"><div class="ci ph">📞</div><div class="ct"><div class="a">电话</div><div class="b tnum">138 **** 8888</div></div><div class="cb" onclick="toast('拨打中…（演示）')">拨打</div></div>
  <div class="contact"><div class="ci wx">💬</div><div class="ct"><div class="a">微信</div><div class="b">jiang_jewel88</div></div><div class="cb" onclick="toast('已复制微信号')">复制</div></div>
  <div style="display:flex;gap:10px;margin-top:24px"><div class="btn ghost" style="flex:1" onclick="tab('order')">查看订单</div><div class="btn" style="flex:1" onclick="tab('home')">返回首页</div></div>`},
};

/* ================= 弹窗 ================= */
const modals={
rules(){return `<div class="sh"><span class="t">发布须知</span><span class="x" onclick="closeM()">✕</span></div>
  <div style="display:flex;flex-direction:column;gap:12px;font-size:13px;color:var(--ink-2);line-height:1.5">
  ${['仅限水贝实物现货，无实物货源禁止挂单报价；','非水贝合规现货、来路不明货品禁止上架；','线下交割买卖双方须实名认证，平台核验后方可履约；','严禁走私金 / 回收赃金 / 管制违禁品类，违规责任自负；','买家锁单后须 4 小时内履约交付，逾期承担违约责任。'].map((r,i)=>`<div style="display:flex;gap:10px"><span style="flex:0 0 24px;width:24px;height:24px;border-radius:50%;background:#FFF1E5;color:var(--tag-orange);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center">${i+1}</span><span>${r}</span></div>`).join('')}</div>
  <div class="btn" style="margin-top:18px" onclick="closeM();go('publishForm')">同意并继续</div>`},

lockConfirm(){const p=modal.p;return `<div class="sh"><span class="t">确认锁价</span><span class="x" onclick="closeM()">✕</span></div>
  <div class="card" style="margin:0;background:var(--cream);box-shadow:none">
  <div class="li" style="cursor:default;padding:12px 0"><span class="muted" style="font-size:13px">现金合计</span><span class="c-up tnum" style="margin-left:auto;font-weight:800;font-size:18px">¥ ${p.cash}</span></div></div>
  <div class="muted" style="font-size:12px;text-align:center;margin:14px 0">确认后将按当前报价锁定，请尽快与卖家完成交割</div>
  <div class="btn" onclick="closeM();go('lockResult');lockDone=false;setTimeout(()=>{lockDone=true;if(cur().n==='lockResult')render()},1600)">确认锁价</div>`},

confirm(){return `<div class="sh"><span class="t">确认交易完成</span><span class="x" onclick="closeM()">✕</span></div>
  <div style="display:flex;flex-direction:column;gap:14px">
  ${['已当面核验实物品质无误（成色、克重、品牌）','货款已结清（现金当面交付 / 转账已到账）','确认交割完成后订单即终结，不可撤销'].map((r,i)=>`<div style="display:flex;gap:12px;font-size:14px"><span style="flex:0 0 28px;width:28px;height:28px;border-radius:50%;background:#E6F4ED;color:var(--down);font-weight:800;display:flex;align-items:center;justify-content:center">${i+1}</span><span>${r}</span></div>`).join('')}</div>
  <div class="muted" style="font-size:12px;text-align:center;margin:16px 0">需买卖双方各自确认；一方先确认后等待对方确认即完成</div>
  <div class="btn" onclick="closeM();toast('已确认，等待对方确认')">确认完成</div>`},

relay(){return `<div class="sh"><span class="t">申请平台代交接</span><span class="x" onclick="closeM()">✕</span></div>
  <div class="row" style="padding:12px 14px;background:var(--cream);border-radius:12px"><span style="font-size:13px;color:var(--ink-2)">服务费</span><span class="c-up tnum" style="margin-left:auto;font-size:20px;font-weight:800">¥100 / 单</span></div>
  <div class="steps" style="margin-top:14px">
  ${[['卖家送货到平台服务点','就近水贝现货核验点'],['平台专员看货核验','成色 / 克重 / 品牌，拍照留档'],['买家打款 · 交易完成','释放双方保证金'],['平台发货给买家','仅物流配送']].map((s,i)=>`<div class="st todo"><span class="i">${i+1}</span><div><div class="tt">${s[0]}</div><div class="td">${s[1]}</div></div></div>`).join('')}</div>
  <div class="muted" style="font-size:11px;line-height:1.6;margin:8px 0 16px">发起方支付 ¥100（可协商分摊），需对方同意后生效；一经转代交接不可改回当面自交。</div>
  <div class="btn" onclick="closeM();toast('已发起代交接申请，等待对方同意（演示）')">支付 ¥100 并申请</div>`},

alert(){return `<div class="sh"><span class="t">订阅金价提醒</span><span class="x" onclick="closeM()">✕</span></div>
  <div class="seg"><div class="s on">黄金</div><div class="s">白银</div><div class="s">铂金</div></div>
  <div class="seg"><div class="s on">涨到</div><div class="s">跌到</div></div>
  <div style="display:flex;align-items:baseline;gap:8px;padding:10px 12px;border:2px solid var(--gold-2);border-radius:12px;margin:10px 0"><span style="font-size:18px;font-weight:800;color:var(--ink-2)">¥</span><input style="flex:1;border:none;outline:none;font-size:22px;font-weight:800;font-family:inherit" value="1,035.00"/><span class="muted" style="font-size:12px">元/克</span></div>
  <div style="display:flex;gap:8px;margin-bottom:14px"><span class="chip on">应用推送</span><span class="chip">短信</span></div>
  <div class="btn" onclick="closeM();toast('已开启提醒（演示）')">开启提醒</div>`},
};

/* ================= 渲染 ================= */
const TAB_ICONS={
  home:'<path d="M3 10.5 12 3l9 7.5M5 9.5V20h14V9.5"/>',
  market:'<path d="M3 17l5-5 3 3 5-7 5 6M3 21h18"/>',
  publish:'<path d="M21 3 10.5 13.5M21 3l-6.5 18-4-8-8-4L21 3Z"/>',
  order:'<rect x="4" y="3" width="16" height="18" rx="2.5"/><path d="M8 8h8M8 12h8M8 16h5"/>',
  mine:'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.5 3.6-6 8-6s8 2.5 8 6"/>',
};
const SUB_TITLE={lock:'锁价',lockResult:'锁价结果',orderDetail:'订单详情',arbitration:'申请仲裁',kyc:'实名认证',profileEdit:'个人资料',margin:'保证金与额度',marginRecharge:'保证金充值',level:'级别与佣金',default:'违约记录',appeal:'违约申诉',address:'收/取货地址',priceAlert:'订阅金价提醒',publishForm:'发布现货',publishResult:'发布结果'};

function render(){
  const c=cur(), isTab=TABS.includes(c.n);
  document.getElementById('screen').innerHTML=(screens[c.n]||(()=>'<div style="padding:40px;text-align:center" class="muted">页面建设中</div>'))();
  // nav
  document.getElementById('nav').innerHTML = isTab
    ? `<span class="title">${TAB_TITLE[c.n]}</span>`
    : `<div class="back" onclick="back()">‹</div><span class="title">${SUB_TITLE[c.n]||''}</span>`;
  // tabbar
  const tb=document.getElementById('tabbar');
  if(isTab){tb.style.display='flex';
    tb.innerHTML=TABS.map(t=>`<div class="tab ${t===c.n?'on':''}" onclick="tab('${t}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${TAB_ICONS[t]}</svg><span>${TAB_TITLE[t]==='微金100'?'首页':TAB_TITLE[t]}</span></div>`).join('');
  } else tb.style.display='none';
  // modal
  const old=document.querySelector('.mask'); if(old)old.remove();
  if(modal){const d=document.createElement('div');d.className='mask';d.onclick=e=>{if(e.target===d)closeM()};
    d.innerHTML=`<div class="sheet">${(modals[modal.t]||(()=>''))()}</div>`;document.querySelector('.device').appendChild(d);}
}
render();
</script>
</body>
</html>
